<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ معركة العصا</title>
    
    <!-- ربط ملف CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <div class="version-badge">⚡ V2.0</div>

        <!-- القائمة الرئيسية -->
        <div class="main-menu" id="mainMenu">
            <div class="game-title">⚡ معركة العصا</div>
            <button class="menu-btn" onclick="startNewGame()">🆕 بدء قتال جديد</button>
            <button class="menu-btn" onclick="showStats()">📊 الإحصائيات</button>
            <button class="menu-btn" onclick="showCharacterSelect()">🎨 تخصيص البطل</button>
        </div>

        <!-- اختيار الشخصية -->
        <div class="character-select-screen" id="characterSelect">
            <h2>🎨 اختر لون مقاتلك</h2>
            <div class="color-grid">
                <div class="color-option color-red" onclick="selectColor('red')" id="colorRed"></div>
                <div class="color-option color-blue" onclick="selectColor('blue')" id="colorBlue"></div>
                <div class="color-option color-green" onclick="selectColor('green')" id="colorGreen"></div>
                <div class="color-option color-yellow" onclick="selectColor('yellow')" id="colorYellow"></div>
                <div class="color-option color-white" onclick="selectColor('white')" id="colorWhite"></div>
                <div class="color-option color-black" onclick="selectColor('black')" id="colorBlack"></div>
            </div>
            <button class="menu-btn" onclick="backToMain()">🔙 عودة</button>
        </div>

        <!-- الإحصائيات -->
        <div class="stats-screen" id="statsScreen">
            <h2>📊 سجلك القتالي</h2>
            <div id="statsDisplay"></div>
            <button class="menu-btn" onclick="backToMain()">🔙 عودة</button>
        </div>

        <!-- شاشة اللعبة -->
        <div class="game-screen" id="gameScreen">
            <div class="arena">
                <canvas id="gameCanvas"></canvas>
                <div class="ready-screen" id="readyScreen">READY?</div>
            </div>

            <!-- واجهة القتال -->
            <div class="game-ui">
                <div class="health-container">
                    <span style="color: #e74c3c;">أنت</span>
                    <div class="health-bar">
                        <div class="health-fill" id="p1HealthBar" style="background:#e74c3c; width:100%"></div>
                    </div>
                </div>
                <div class="versus">VS</div>
                <div class="health-container">
                    <div class="health-bar">
                        <div class="health-fill" id="p2HealthBar" style="background:#3498db; width:100%"></div>
                    </div>
                    <span style="color: #3498db;">AI</span>
                </div>
            </div>

            <!-- شريط الوقت -->
            <div class="timer-bar">
                <div class="timer-fill" id="timerBar" style="width:100%"></div>
            </div>

            <!-- عداد الكومبو -->
            <div class="combo-counter" id="comboDisplay">
                <span>⚡</span> 0
            </div>

            <!-- مؤشر القوة -->
            <div class="power-meter">
                <span>💪 قوة الهجوم</span>
                <div class="power-bar">
                    <div class="power-fill" id="powerMeter"></div>
                </div>
            </div>

            <!-- رسالة تنبيه الصوت -->
            <div class="audio-warning" id="audioWarning">
                ⚠️ اضغط على أي زر في اللعبة لتفعيل الصوت
            </div>

            <!-- أزرار التحكم -->
            <div class="controls-area">
                <div class="joystick-area">
                    <div class="joystick" id="btnLeft">←</div>
                    <div class="joystick" id="btnRight">→</div>
                </div>
                <div class="control-btn jump-btn" id="btnJump">⬆️ قفز</div>
                <div class="control-btn attack-btn" id="btnAttack">👊 هجوم</div>
                <div class="control-btn block-btn" id="btnBlock">🛡️ تصدي</div>
            </div>

            <!-- أزرار الصوت -->
            <div class="sound-controls">
                <button class="sound-btn" id="muteBtn">🔊 تشغيل الصوت</button>
                <button class="sound-btn" id="rematchBtn">🔄 لعب مجدداً</button>
                <button class="sound-btn" id="testSoundBtn" style="display:none;">🔊 اختبار</button>
            </div>

            <div class="game-message" id="gameMessage"></div>
            <button class="menu-btn" onclick="backToMainFromGame()">🏠 العودة للقائمة</button>
        </div>
    </div>

    <!-- ربط ملف JavaScript -->
    <script src="script.js"></script>
</body>
</html>
